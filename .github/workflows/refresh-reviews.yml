name: Refresh homepage reviews

on:
  # Triggered by Judge.me webhook (repository_dispatch event)
  repository_dispatch:
    types: [judgeme_review_published]

  # Run every 6 hours
  schedule:
    - cron: '0 */6 * * *'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch reviews from Judge.me and push to live Shopify theme
        env:
          JUDGEME_TOKEN: ${{ secrets.JUDGEME_PRIVATE_TOKEN }}
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_THEME_TOKEN }}
          SHOP_DOMAIN: ejjge0-zf.myshopify.com
          MIN_RATING: "3"
          COUNT: "8"
        run: |
          echo "Fetching reviews from Judge.me..."
          REVIEWS=$(curl -sf \
            "https://judge.me/api/v1/reviews?api_token=${JUDGEME_TOKEN}&shop_domain=${SHOP_DOMAIN}&per_page=${COUNT}&rating[gte]=${MIN_RATING}&sort_by=published_at&sort_dir=desc" \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          reviews = data.get('reviews', [])
          output = []
          generic = {'customer name.', 'customer name', 'customer', ''}
          for r in reviews:
            raw_name = (r.get('reviewer') or {}).get('name', '').strip()
            display_name = 'Verified Customer' if raw_name.lower() in generic else raw_name
            output.append({
              'rating': r.get('rating', 5),
              'body': r.get('body', ''),
              'reviewer': {'name': display_name},
              'product_title': r.get('product_title', ''),
              'verified_buyer': r.get('verified_buyer', False)
            })
          print(json.dumps(output))
          ")

          if [ -z "$REVIEWS" ] || [ "$REVIEWS" = "[]" ]; then
            echo "No reviews returned, skipping upload."
            exit 0
          fi

          echo "Detecting live theme ID..."
          LIVE_THEME_ID=$(curl -sf \
            "https://${SHOP_DOMAIN}/admin/api/2024-01/themes.json" \
            -H "X-Shopify-Access-Token: ${SHOPIFY_TOKEN}" \
            | python3 -c "
          import json, sys
          themes = json.load(sys.stdin).get('themes', [])
          live = next((t['id'] for t in themes if t.get('role') == 'main'), None)
          print(live)
          ")

          if [ -z "$LIVE_THEME_ID" ] || [ "$LIVE_THEME_ID" = "None" ]; then
            echo "Could not detect live theme ID, aborting."
            exit 1
          fi

          echo "Live theme ID: ${LIVE_THEME_ID}"

          echo "Uploading reviews-data.json to Shopify..."
          ENCODED=$(python3 -c "import json, sys; print(json.dumps(sys.stdin.read()))" <<< "$REVIEWS")

          RESPONSE=$(curl -sf -X PUT \
            "https://${SHOP_DOMAIN}/admin/api/2024-01/themes/${LIVE_THEME_ID}/assets.json" \
            -H "X-Shopify-Access-Token: ${SHOPIFY_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"asset\": {\"key\": \"assets/reviews-data.json\", \"value\": ${ENCODED}}}" 2>&1)

          echo "Done! reviews-data.json updated on live theme ${LIVE_THEME_ID}."
