name: Refresh homepage reviews

on:
  repository_dispatch:
    types: [judgeme_review_published]
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Fetch reviews from Judge.me
        env:
          JUDGEME_TOKEN: ${{ secrets.JUDGEME_PRIVATE_TOKEN }}
          SHOP_DOMAIN: ejjge0-zf.myshopify.com
        run: |
          echo "Fetching reviews from Judge.me..."
          RAW=$(curl -sg \
            "https://judge.me/api/v1/reviews?api_token=${JUDGEME_TOKEN}&shop_domain=${SHOP_DOMAIN}&per_page=50&sort_by=published_at&sort_dir=desc")

          echo "$RAW" | python3 -c "
          import json, sys
          try:
            data = json.load(sys.stdin)
          except Exception as e:
            print('JSON parse error: ' + str(e), file=sys.stderr)
            sys.exit(1)
          reviews = data.get('reviews', [])
          output = []
          generic = {'customer name.', 'customer name', 'customer', ''}
          for r in reviews:
            raw_name = (r.get('reviewer') or {}).get('name', '').strip()
            display_name = 'Verified Customer' if raw_name.lower() in generic else raw_name
            output.append({
              'rating': r.get('rating', 5),
              'body': r.get('body', ''),
              'reviewer': {'name': display_name},
              'product_title': r.get('product_title', ''),
              'verified_buyer': r.get('verified_buyer', False)
            })
          print(json.dumps(output))
          " > assets/reviews-data.json

          COUNT=$(python3 -c "import json; print(len(json.load(open('assets/reviews-data.json'))))")
          echo "Got ${COUNT} reviews, saved to assets/reviews-data.json"

      - name: Push reviews-data.json to Shopify
        env:
          SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_THEME_TOKEN }}
        run: |
          shopify theme push \
            --store ejjge0-zf.myshopify.com \
            --theme 161366671602 \
            --only assets/reviews-data.json \
            --no-color
          echo "Done! reviews-data.json updated on Shopify."
